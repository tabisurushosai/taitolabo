# 毎週火曜 AM 5:00 JST = UTC 月曜 20:00
name: Weekly Narou Fetch

on:
  schedule:
    - cron: "0 20 * * 1"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: weekly-fetch
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # 辞書の存在確認は行わない（ホストにより node_modules レイアウトが変わると test -d が偽陰性になるため）。
      # 欠損時は fetch 内の kuromoji.builder が失敗する。

      - name: Fetch Narou rankings and push to Redis
        run: npm run fetch-narou:push
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
